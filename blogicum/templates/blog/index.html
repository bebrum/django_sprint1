{% extends "base.html" %}
{% block title %}
  Лента записей
{% endblock %}

{% block content %}  
        <h1>Лента записей</h1>
        {% for post in posts|dictsortreversed:"id" %}
          <hr>
          <article>
            <ul>
              <li>
                {{post.location}}             
              </li>
              <li>
                {{post.date}}  
              </li>
              <li>
              <!---  Категория: <a href="not-my-day">not-my-day</a> -->
                <a href="category/{{post.category}}">{{post.category}}</a>  
              </li>
            </ul>          
            <!-- Первые 10 слов -->
            <p>
              {{post.text|truncatewords:10}}    
            </p>
            <a href="posts/{{post.id}}">Читать полный текст</a>
          </article>
        {% endfor %}
      
{% endblock %}
